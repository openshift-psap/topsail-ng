# PIPELINE DEFINITION
# Name: rhoai-benchmark-v2
# Description: RHOAI Benchmark with LLMInferenceService, secret mounting, and log streaming
# Inputs:
#    accelerator: str [Default: 'H200']
#    guidellm_data: str [Default: 'prompt_tokens=1000,output_tokens=1000']
#    guidellm_image: str [Default: 'image-registry.openshift-image-registry.svc:5000/llm-d-bench/guidellm-custom:v0.5.3']
#    guidellm_max_seconds: str [Default: '120']
#    guidellm_rate: str [Default: '1,10']
#    kubeconfig_secret: str [Default: 'h200-kubeconfig']
#    kueue_queue_name: str [Default: 'benchmark-queue']
#    mlflow_enabled: str [Default: 'false']
#    model_name: str [Default: 'Qwen/Qwen3-0.6B']
#    namespace: str [Default: 'llm-d-bench']
#    routing_mode: str [Default: 'direct']
#    run_uuid: str [Default: '']
#    skip_cleanup: bool [Default: False]
#    tp: int [Default: 4.0]
#    version: str [Default: 'RHOAI-3.2']
#    vllm_args: str [Default: '--max-model-len=8192,--gpu-memory-utilization=0.95']
components:
  comp-cleanup:
    dag:
      tasks:
        cleanup-kueue-workload:
          cachingOptions: {}
          componentRef:
            name: comp-cleanup-kueue-workload
          inputs:
            parameters:
              namespace:
                runtimeValue:
                  constant: benchmark-system
              workload_name:
                componentInputParameter: workload_name
          taskInfo:
            name: cleanup-kueue-workload
        condition-1:
          componentRef:
            name: comp-condition-1-2
          inputs:
            parameters:
              pipelinechannel--deployment_name:
                componentInputParameter: deployment_name
              pipelinechannel--namespace:
                componentInputParameter: namespace
              pipelinechannel--skip_cleanup:
                componentInputParameter: skip_cleanup
          taskInfo:
            name: cleanup-deployment
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--skip_cleanup'] ==
              false
    inputDefinitions:
      parameters:
        deployment_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
        skip_cleanup:
          parameterType: BOOLEAN
        workload_name:
          parameterType: STRING
  comp-cleanup-kueue-workload:
    executorLabel: exec-cleanup-kueue-workload
    inputDefinitions:
      parameters:
        namespace:
          defaultValue: benchmark-system
          isOptional: true
          parameterType: STRING
        workload_name:
          parameterType: STRING
  comp-cleanup-rhoai-deployment:
    executorLabel: exec-cleanup-rhoai-deployment
    inputDefinitions:
      parameters:
        deployment_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
  comp-condition-1:
    dag:
      tasks:
        upload-to-mlflow:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-upload-to-mlflow
          inputs:
            artifacts:
              benchmark_logs:
                componentInputArtifact: pipelinechannel--run-guidellm-benchmark-benchmark_logs
              benchmark_results:
                componentInputArtifact: pipelinechannel--run-guidellm-benchmark-benchmark_results
              llmis_yaml:
                componentInputArtifact: pipelinechannel--deploy-rhoai-model-llmis_yaml
            parameters:
              accelerator:
                componentInputParameter: pipelinechannel--accelerator
              guidellm_data:
                componentInputParameter: pipelinechannel--guidellm_data
              guidellm_rate:
                componentInputParameter: pipelinechannel--guidellm_rate
              model_name:
                componentInputParameter: pipelinechannel--model_name
              run_uuid:
                componentInputParameter: pipelinechannel--run_uuid
              tp:
                componentInputParameter: pipelinechannel--tp
              version:
                componentInputParameter: pipelinechannel--version
          taskInfo:
            name: upload-to-mlflow
    inputDefinitions:
      artifacts:
        pipelinechannel--deploy-rhoai-model-llmis_yaml:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        pipelinechannel--run-guidellm-benchmark-benchmark_logs:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        pipelinechannel--run-guidellm-benchmark-benchmark_results:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--accelerator:
          parameterType: STRING
        pipelinechannel--guidellm_data:
          parameterType: STRING
        pipelinechannel--guidellm_rate:
          parameterType: STRING
        pipelinechannel--mlflow_enabled:
          parameterType: STRING
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--run_uuid:
          parameterType: STRING
        pipelinechannel--tp:
          parameterType: NUMBER_INTEGER
        pipelinechannel--version:
          parameterType: STRING
  comp-condition-1-2:
    dag:
      tasks:
        cleanup-rhoai-deployment:
          cachingOptions: {}
          componentRef:
            name: comp-cleanup-rhoai-deployment
          inputs:
            parameters:
              deployment_name:
                componentInputParameter: pipelinechannel--deployment_name
              namespace:
                componentInputParameter: pipelinechannel--namespace
          taskInfo:
            name: cleanup-rhoai-deployment
    inputDefinitions:
      parameters:
        pipelinechannel--deployment_name:
          parameterType: STRING
        pipelinechannel--namespace:
          parameterType: STRING
        pipelinechannel--skip_cleanup:
          parameterType: BOOLEAN
  comp-deploy-rhoai-model:
    executorLabel: exec-deploy-rhoai-model
    inputDefinitions:
      parameters:
        enable_auth:
          defaultValue: 'false'
          isOptional: true
          parameterType: STRING
        gateway_name:
          defaultValue: openshift-ai-inference
          isOptional: true
          parameterType: STRING
        gateway_namespace:
          defaultValue: openshift-ingress
          isOptional: true
          parameterType: STRING
        kueue_queue_name:
          parameterType: STRING
        model_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
        replicas:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        routing_mode:
          parameterType: STRING
        run_uuid:
          parameterType: STRING
        tp:
          parameterType: NUMBER_INTEGER
        vllm_args:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        llmis_yaml:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        deployment_name:
          parameterType: STRING
        direct_endpoint:
          parameterType: STRING
        target_endpoint:
          parameterType: STRING
  comp-run-guidellm-benchmark:
    executorLabel: exec-run-guidellm-benchmark
    inputDefinitions:
      parameters:
        accelerator:
          parameterType: STRING
        deployment_name:
          parameterType: STRING
        guidellm_data:
          parameterType: STRING
        guidellm_image:
          parameterType: STRING
        guidellm_max_seconds:
          parameterType: STRING
        guidellm_rate:
          parameterType: STRING
        model_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
        target_endpoint:
          parameterType: STRING
        version:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        benchmark_logs:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        benchmark_results:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-stream-vllm-logs:
    executorLabel: exec-stream-vllm-logs
    inputDefinitions:
      parameters:
        deployment_name:
          parameterType: STRING
        duration_seconds:
          defaultValue: 1800.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        namespace:
          parameterType: STRING
  comp-upload-to-mlflow:
    executorLabel: exec-upload-to-mlflow
    inputDefinitions:
      artifacts:
        benchmark_logs:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        benchmark_results:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        llmis_yaml:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        accelerator:
          parameterType: STRING
        guidellm_data:
          parameterType: STRING
        guidellm_rate:
          parameterType: STRING
        model_name:
          parameterType: STRING
        run_uuid:
          parameterType: STRING
        tp:
          parameterType: NUMBER_INTEGER
        version:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-wait-for-endpoint:
    executorLabel: exec-wait-for-endpoint
    inputDefinitions:
      parameters:
        deployment_name:
          parameterType: STRING
        namespace:
          parameterType: STRING
        target_endpoint:
          parameterType: STRING
        timeout_seconds:
          defaultValue: 3600.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-cleanup-kueue-workload:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cleanup_kueue_workload
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cleanup_kueue_workload(\n    workload_name: str,\n    namespace:\
          \ str = \"benchmark-system\",\n):\n    \"\"\"Delete Kueue workload on management\
          \ cluster to release quota.\n\n    This component runs on the management\
          \ cluster where KFP is installed,\n    so it uses in-cluster credentials\
          \ (no kubeconfig needed).\n    \"\"\"\n    import subprocess\n    import\
          \ os\n    import urllib.request\n    import tarfile\n\n    os.environ[\"\
          PYTHONUNBUFFERED\"] = \"1\"\n\n    # Install oc CLI to /tmp (writable location)\n\
          \    print(\"Installing OpenShift CLI...\", flush=True)\n    oc_url = \"\
          https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz\"\
          \n    tar_path = \"/tmp/oc.tar.gz\"\n    bin_path = \"/tmp/bin\"\n    os.makedirs(bin_path,\
          \ exist_ok=True)\n    urllib.request.urlretrieve(oc_url, tar_path)\n   \
          \ with tarfile.open(tar_path, \"r:gz\") as tar:\n        tar.extractall(bin_path)\n\
          \    os.chmod(f\"{bin_path}/oc\", 0o755)\n    os.environ[\"PATH\"] = f\"\
          {bin_path}:{os.environ.get('PATH', '')}\"\n    print(\"OpenShift CLI installed.\"\
          , flush=True)\n\n    print(\"=\" * 60, flush=True)\n    print(\"Stage: Cleanup\
          \ Kueue Workload\", flush=True)\n    print(\"=\" * 60, flush=True)\n   \
          \ print(f\"Workload: {workload_name}\", flush=True)\n    print(f\"Namespace:\
          \ {namespace}\", flush=True)\n\n    # Use in-cluster credentials (pipeline\
          \ runs on management cluster)\n    result = subprocess.run(\n        [\"\
          oc\", \"delete\", \"workload\", workload_name, \"-n\", namespace, \"--ignore-not-found\"\
          ],\n        capture_output=True, text=True\n    )\n\n    if result.returncode\
          \ == 0:\n        print(f\"Deleted workload: {workload_name}\", flush=True)\n\
          \        print(\"Quota released!\", flush=True)\n    else:\n        print(f\"\
          Warning: Failed to delete workload: {result.stderr}\", flush=True)\n\n"
        image: python:3.9-slim
    exec-cleanup-rhoai-deployment:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - cleanup_rhoai_deployment
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef cleanup_rhoai_deployment(\n    deployment_name: str,\n    namespace:\
          \ str,\n):\n    \"\"\"Cleanup LLMInferenceService deployment.\"\"\"\n  \
          \  import subprocess\n    import os\n    import urllib.request\n    import\
          \ tarfile\n\n    # Force unbuffered output for KFP log streaming\n    os.environ[\"\
          PYTHONUNBUFFERED\"] = \"1\"\n\n    # Install oc CLI to /tmp (writable location)\n\
          \    print(\"Installing OpenShift CLI...\", flush=True)\n    oc_url = \"\
          https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz\"\
          \n    tar_path = \"/tmp/oc.tar.gz\"\n    bin_path = \"/tmp/bin\"\n    os.makedirs(bin_path,\
          \ exist_ok=True)\n    urllib.request.urlretrieve(oc_url, tar_path)\n   \
          \ with tarfile.open(tar_path, \"r:gz\") as tar:\n        tar.extractall(bin_path)\n\
          \    os.chmod(f\"{bin_path}/oc\", 0o755)\n    os.environ[\"PATH\"] = f\"\
          {bin_path}:{os.environ.get('PATH', '')}\"\n    print(\"OpenShift CLI installed.\"\
          , flush=True)\n\n    print(\"=\" * 60, flush=True)\n    print(\"Stage 4:\
          \ Cleanup Deployment\", flush=True)\n    print(\"=\" * 60, flush=True)\n\
          \n    kubeconfig = \"/kubeconfig/config\"\n\n    def oc(args):\n       \
          \ cmd = [\"oc\", \"--kubeconfig\", kubeconfig] + args\n        result =\
          \ subprocess.run(cmd, capture_output=True, text=True)\n        print(result.stdout,\
          \ flush=True)\n        return result\n\n    print(f\"Deleting LLMInferenceService:\
          \ {deployment_name}\", flush=True)\n    oc([\"delete\", \"llminferenceservice\"\
          , deployment_name, \"-n\", namespace, \"--ignore-not-found\"])\n\n    print(\"\
          Waiting for cleanup...\", flush=True)\n    import time\n    time.sleep(10)\n\
          \n    print(\"Cleanup complete!\", flush=True)\n\n"
        image: python:3.9-slim
    exec-deploy-rhoai-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_rhoai_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_rhoai_model(\n    model_name: str,\n    namespace: str,\n\
          \    tp: int,\n    routing_mode: str,\n    kueue_queue_name: str,\n    vllm_args:\
          \ str,\n    run_uuid: str,\n    llmis_yaml: Output[Artifact],\n    enable_auth:\
          \ str = \"false\",\n    replicas: int = 1,\n    gateway_name: str = \"openshift-ai-inference\"\
          ,\n    gateway_namespace: str = \"openshift-ingress\",\n) -> NamedTuple(\"\
          Outputs\", [(\"deployment_name\", str), (\"target_endpoint\", str), (\"\
          direct_endpoint\", str)]):\n    \"\"\"Deploy model as LLMInferenceService\
          \ on target cluster.\"\"\"\n    import subprocess\n    import os\n    import\
          \ urllib.request\n    import tarfile\n\n    # Force unbuffered output for\
          \ KFP log streaming\n    os.environ[\"PYTHONUNBUFFERED\"] = \"1\"\n\n  \
          \  # Install oc CLI to /tmp (writable location)\n    print(\"Installing\
          \ OpenShift CLI...\", flush=True)\n    oc_url = \"https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz\"\
          \n    tar_path = \"/tmp/oc.tar.gz\"\n    bin_path = \"/tmp/bin\"\n    os.makedirs(bin_path,\
          \ exist_ok=True)\n    urllib.request.urlretrieve(oc_url, tar_path)\n   \
          \ with tarfile.open(tar_path, \"r:gz\") as tar:\n        tar.extractall(bin_path)\n\
          \    os.chmod(f\"{bin_path}/oc\", 0o755)\n    os.environ[\"PATH\"] = f\"\
          {bin_path}:{os.environ.get('PATH', '')}\"\n    print(\"OpenShift CLI installed.\"\
          , flush=True)\n\n    print(\"=\" * 60, flush=True)\n    print(\"Stage 1:\
          \ Deploy RHOAI Model (LLMInferenceService)\", flush=True)\n    print(\"\
          =\" * 60, flush=True)\n\n    kubeconfig = \"/kubeconfig/config\"\n\n   \
          \ # Generate deployment name (ensure no trailing hyphen)\n    base_name\
          \ = model_name.lower().replace(\"/\", \"-\").replace(\".\", \"\")[:42].rstrip(\"\
          -\")\n    if run_uuid:\n        # Use last 5 chars of uuid (more unique\
          \ than first 5)\n        uuid_suffix = run_uuid[-5:].strip(\"-\")\n    \
          \    deployment_name = f\"{base_name}-{uuid_suffix}\".rstrip(\"-\")\n  \
          \  else:\n        deployment_name = base_name\n\n    print(f\"Model: {model_name}\"\
          , flush=True)\n    print(f\"Deployment: {deployment_name}\", flush=True)\n\
          \    print(f\"Namespace: {namespace}\", flush=True)\n    print(f\"TP: {tp}\"\
          , flush=True)\n    print(f\"Routing Mode: {routing_mode}\", flush=True)\n\
          \    print(\"\", flush=True)\n\n    def oc(args, input_data=None):\n   \
          \     cmd = [\"oc\", \"--kubeconfig\", kubeconfig] + args\n        print(f\"\
          $ {' '.join(cmd)}\")\n        result = subprocess.run(cmd, capture_output=True,\
          \ text=True, input=input_data)\n        if result.stdout:\n            print(result.stdout)\n\
          \        if result.stderr:\n            print(f\"stderr: {result.stderr}\"\
          )\n        return result\n\n    # Check connectivity\n    print(\"Checking\
          \ cluster connectivity...\", flush=True)\n    result = oc([\"cluster-info\"\
          ])\n    if result.returncode != 0:\n        raise RuntimeError(f\"Cannot\
          \ connect to cluster: {result.stderr}\")\n\n    # Check if LLMInferenceService\
          \ already exists\n    result = oc([\"get\", \"llminferenceservice\", deployment_name,\
          \ \"-n\", namespace])\n    if result.returncode == 0:\n        print(f\"\
          LLMInferenceService {deployment_name} already exists - reusing\", flush=True)\n\
          \        # Retrieve existing YAML for artifact\n        result = oc([\"\
          get\", \"llminferenceservice\", deployment_name, \"-n\", namespace, \"-o\"\
          , \"yaml\"])\n        if result.returncode == 0:\n            os.makedirs(os.path.dirname(llmis_yaml.path),\
          \ exist_ok=True)\n            with open(llmis_yaml.path, \"w\") as f:\n\
          \                f.write(result.stdout)\n            print(f\"Saved existing\
          \ LLMInferenceService YAML to artifact\", flush=True)\n    else:\n     \
          \   # Model URI references PVC\n        model_dir_name = model_name.replace(\"\
          /\", \"-\")\n        model_uri = f\"pvc://models-storage/models/{model_dir_name}\"\
          \n\n        # Build VLLM_ARGS as YAML (8-space indentation to match args\
          \ list)\n        vllm_args_yaml = \"\"\n        for arg in vllm_args.split(\"\
          ,\"):\n            arg = arg.strip()\n            if arg:\n            \
          \    vllm_args_yaml += f'\\n        - \"{arg}\"'\n\n        # Build labels\n\
          \        extra_labels = \"\"\n        pod_extra_labels = \"\"\n        if\
          \ kueue_queue_name:\n            extra_labels += f\"\\n    kueue.x-k8s.io/queue-name:\
          \ {kueue_queue_name}\"\n            pod_extra_labels += f\"\\n        kueue.x-k8s.io/queue-name:\
          \ {kueue_queue_name}\"\n        if run_uuid:\n            extra_labels +=\
          \ f\"\\n    deployment_uuid: {run_uuid}\"\n            pod_extra_labels\
          \ += f\"\\n        deployment_uuid: {run_uuid}\"\n\n        # Router config\
          \ based on routing mode\n        if routing_mode == \"direct\":\n      \
          \      router_config = \"\"\"router:\n    route: {}\n    gateway: {}\n \
          \   scheduler: {}\"\"\"\n        elif routing_mode == \"prefix-estimation\"\
          :\n            router_config = f\"\"\"router:\n    scheduler:\n      template:\n\
          \        containers:\n          - name: main\n            args:\n      \
          \        - '-v=4'\n              - '--cert-path'\n              - /var/run/kserve/tls\n\
          \              - '--pool-group'\n              - inference.networking.x-k8s.io\n\
          \              - '--pool-name'\n              - '{{{{ ChildName .ObjectMeta.Name\
          \ `-inference-pool` }}}}'\n              - '--pool-namespace'\n        \
          \      - '{{{{ .ObjectMeta.Namespace }}}}'\n              - '--zap-encoder'\n\
          \              - json\n              - '--grpc-port'\n              - '9002'\n\
          \              - '--grpc-health-port'\n              - '9003'\n        \
          \      - '--secure-serving'\n              - '--model-server-metrics-scheme'\n\
          \              - https\n              - '--config-text'\n              -\
          \ |\n                apiVersion: inference.networking.x-k8s.io/v1alpha1\n\
          \                kind: EndpointPickerConfig\n                plugins:\n\
          \                - type: single-profile-handler\n                - type:\
          \ queue-scorer\n                - type: kv-cache-utilization-scorer\n  \
          \              schedulingProfiles:\n                - name: default\n  \
          \                plugins:\n                  - pluginRef: queue-scorer\n\
          \                    weight: 1\n                  - pluginRef: kv-cache-utilization-scorer\n\
          \                    weight: 2\n    route: {{}}\n    gateway:\n      gatewayRef:\n\
          \        name: {gateway_name}\n        namespace: {gateway_namespace}\"\"\
          \"\n        elif routing_mode == \"prefix-precise\":\n            router_config\
          \ = f\"\"\"router:\n    scheduler:\n      template:\n        containers:\n\
          \          - name: main\n            args:\n              - '-v=4'\n   \
          \           - '--cert-path'\n              - /var/run/kserve/tls\n     \
          \         - '--pool-group'\n              - inference.networking.x-k8s.io\n\
          \              - '--pool-name'\n              - '{{{{ ChildName .ObjectMeta.Name\
          \ `-inference-pool` }}}}'\n              - '--pool-namespace'\n        \
          \      - '{{{{ .ObjectMeta.Namespace }}}}'\n              - '--zap-encoder'\n\
          \              - json\n              - '--grpc-port'\n              - '9002'\n\
          \              - '--grpc-health-port'\n              - '9003'\n        \
