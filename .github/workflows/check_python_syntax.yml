name: Check the Python syntax

on:
  pull_request:
    branches: [main]
jobs:
  check_python_syntax:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
    steps:
      - name: Use checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check that all the files can be compiled
        run: |
          set -o pipefail
          set -o errexit

          python -m compileall . | (grep -v -E '(^Listing|^Compiling)' || true)
