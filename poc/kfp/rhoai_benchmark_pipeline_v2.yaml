          \    # Connect to SageMaker MLflow\n    print(f\"Connecting to MLflow: {MLFLOW_TRACKING_ARN}\"\
          , flush=True)\n    mlflow.set_tracking_uri(MLFLOW_TRACKING_ARN)\n\n    #\
          \ Experiment name: {model}-{accelerator}\n    experiment_name = f\"{model_name.replace('/',\
          \ '-')}-{accelerator}\"\n    print(f\"Experiment: {experiment_name}\", flush=True)\n\
          \n    try:\n        mlflow.set_experiment(experiment_name)\n    except Exception\
          \ as e:\n        print(f\"ERROR: Failed to set experiment: {e}\", flush=True)\n\
          \        return \"experiment_failed\"\n\n    # Extract args from GuideLLM\
          \ output\n    args = data.get(\"args\", {})\n\n    # Start MLflow run\n\
          \    try:\n        with mlflow.start_run(run_name=run_uuid) as run:\n  \
          \          # Log tags\n            mlflow.set_tag(\"run_uuid\", run_uuid)\n\
          \            mlflow.set_tag(\"pipeline_run_uuid\", run_uuid)\n         \
          \   mlflow.set_tag(\"model\", model_name)\n            mlflow.set_tag(\"\
          accelerator\", accelerator)\n            mlflow.set_tag(\"version\", version)\n\
          \            mlflow.set_tag(\"rate_type\", args.get(\"rate_type\", \"concurrent\"\
          ))\n\n            # Log parameters\n            params = {\n           \
          \     \"model\": model_name,\n                \"tp\": tp,\n            \
          \    \"accelerator\": accelerator,\n                \"version\": version,\n\
          \                \"run_uuid\": run_uuid,\n                \"rates\": guidellm_rate,\n\
          \                \"prompt_tokens\": prompt_tokens,\n                \"output_tokens\"\
          : output_tokens,\n            }\n            if args.get(\"backend_type\"\
          ):\n                params[\"backend_type\"] = args.get(\"backend_type\"\
          )\n            if args.get(\"target\"):\n                params[\"target\"\
          ] = args.get(\"target\")\n            if args.get(\"max_seconds\"):\n  \
          \              params[\"max_seconds\"] = args.get(\"max_seconds\")\n\n \
          \           mlflow.log_params(params)\n            print(f\"Logged {len(params)}\
          \ parameters\", flush=True)\n\n            # Log metrics from each benchmark\
          \ (with concurrency as step)\n            csv_rows = []\n            for\
          \ benchmark in benchmarks:\n                # Get concurrency step\n   \
          \             config = benchmark.get(\"config\") or benchmark.get(\"args\"\
          , {})\n                try:\n                    concurrency = int(config.get(\"\
          strategy\", {}).get(\"streams\", 0))\n                except (KeyError,\
          \ TypeError):\n                    concurrency = 0\n\n                all_metrics\
          \ = benchmark.get(\"metrics\", {})\n                scheduler_metrics =\
          \ benchmark.get(\"scheduler_metrics\", {})\n                run_stats =\
          \ benchmark.get(\"run_stats\", {})\n                requests_made = scheduler_metrics.get(\"\
          requests_made\", {}) or run_stats.get(\"requests_made\", {})\n\n       \
          \         # Extract metrics (matching llm-d-bench pattern)\n           \
          \     metric_map = {\n                    \"total_requests\": requests_made.get(\"\
          total\"),\n                    \"successful_requests\": requests_made.get(\"\
          successful\"),\n                    \"failed_requests\": requests_made.get(\"\
          errored\"),\n                    \"throughput_requests_per_sec\": get_nested(all_metrics,\
          \ \"requests_per_second\", \"successful\", \"mean\"),\n                \
          \    \"total_tokens_per_second\": get_nested(all_metrics, \"tokens_per_second\"\
          , \"successful\", \"mean\"),\n                    \"throughput_output_tokens_per_sec\"\
          : get_nested(all_metrics, \"output_tokens_per_second\", \"successful\",\
          \ \"mean\"),\n                    \"request_concurrency_mean\": get_nested(all_metrics,\
          \ \"request_concurrency\", \"successful\", \"mean\"),\n                \
          \    \"latency_mean_sec\": get_nested(all_metrics, \"request_latency\",\
          \ \"successful\", \"mean\"),\n                    \"latency_median_sec\"\
          : get_nested(all_metrics, \"request_latency\", \"successful\", \"median\"\
          ),\n                    \"latency_p99_sec\": get_nested(all_metrics, \"\
          request_latency\", \"successful\", \"percentiles\", \"p99\"),\n        \
          \            \"ttft_mean_ms\": get_nested(all_metrics, \"time_to_first_token_ms\"\
          , \"successful\", \"mean\"),\n                    \"ttft_median_ms\": get_nested(all_metrics,\
          \ \"time_to_first_token_ms\", \"successful\", \"median\"),\n           \
          \         \"ttft_p95_ms\": get_nested(all_metrics, \"time_to_first_token_ms\"\
          , \"successful\", \"percentiles\", \"p95\"),\n                    \"ttft_p99_ms\"\
          : get_nested(all_metrics, \"time_to_first_token_ms\", \"successful\", \"\
          percentiles\", \"p99\"),\n                    \"tpot_mean_ms\": get_nested(all_metrics,\
          \ \"time_per_output_token_ms\", \"successful\", \"mean\"),\n           \
          \         \"tpot_median_ms\": get_nested(all_metrics, \"time_per_output_token_ms\"\
          , \"successful\", \"median\"),\n                    \"tpot_p95_ms\": get_nested(all_metrics,\
          \ \"time_per_output_token_ms\", \"successful\", \"percentiles\", \"p95\"\
          ),\n                    \"tpot_p99_ms\": get_nested(all_metrics, \"time_per_output_token_ms\"\
          , \"successful\", \"percentiles\", \"p99\"),\n                    \"itl_mean_ms\"\
          : get_nested(all_metrics, \"inter_token_latency_ms\", \"successful\", \"\
          mean\"),\n                    \"itl_median_ms\": get_nested(all_metrics,\
          \ \"inter_token_latency_ms\", \"successful\", \"median\"),\n           \
          \         \"itl_p95_ms\": get_nested(all_metrics, \"inter_token_latency_ms\"\
          , \"successful\", \"percentiles\", \"p95\"),\n                    \"itl_p99_ms\"\
          : get_nested(all_metrics, \"inter_token_latency_ms\", \"successful\", \"\
          percentiles\", \"p99\"),\n                }\n\n                # Filter\
          \ out None values and log\n                metrics = {k: v for k, v in metric_map.items()\
          \ if v is not None}\n\n                # Add calculated metrics\n      \
          \          if metrics.get(\"total_requests\", 0) > 0 and \"failed_requests\"\
          \ in metrics:\n                    metrics[\"error_rate\"] = metrics[\"\
          failed_requests\"] / metrics[\"total_requests\"]\n\n                metrics[\"\
          concurrency\"] = concurrency\n\n                # Log each metric with concurrency\
          \ as step\n                for key, value in metrics.items():\n        \
          \            mlflow.log_metric(key, value, step=concurrency)\n\n       \
          \         print(f\"Logged {len(metrics)} metrics for concurrency={concurrency}\"\
          , flush=True)\n\n                # Build CSV row\n                csv_rows.append({\n\
          \                    \"run\": f\"{accelerator}-{model_name}-{tp}\",\n  \
          \                  \"accelerator\": accelerator,\n                    \"\
          model\": model_name,\n                    \"version\": version,\n      \
          \              \"prompt_toks\": prompt_tokens,\n                    \"output_toks\"\
          : output_tokens,\n                    \"TP\": tp,\n                    \"\
          measured_concurrency\": metrics.get(\"request_concurrency_mean\", \"\"),\n\
          \                    \"intended_concurrency\": concurrency,\n          \
          \          \"measured_rps\": metrics.get(\"throughput_requests_per_sec\"\
          , \"\"),\n                    \"output_tok_per_sec\": metrics.get(\"throughput_output_tokens_per_sec\"\
          , \"\"),\n                    \"ttft_mean_ms\": metrics.get(\"ttft_mean_ms\"\
          , \"\"),\n                    \"ttft_p99_ms\": metrics.get(\"ttft_p99_ms\"\
          , \"\"),\n                    \"tpot_mean_ms\": metrics.get(\"tpot_mean_ms\"\
          , \"\"),\n                    \"tpot_p99_ms\": metrics.get(\"tpot_p99_ms\"\
          , \"\"),\n                    \"latency_mean_sec\": metrics.get(\"latency_mean_sec\"\
          , \"\"),\n                    \"latency_p99_sec\": metrics.get(\"latency_p99_sec\"\
          , \"\"),\n                    \"successful_requests\": metrics.get(\"successful_requests\"\
          , \"\"),\n                    \"failed_requests\": metrics.get(\"failed_requests\"\
          , \"\"),\n                    \"uuid\": run_uuid,\n                })\n\n\
          \            # Generate and upload CSV\n            if csv_rows:\n     \
          \           csv_path = \"/tmp/benchmark_results.csv\"\n                fieldnames\
          \ = list(csv_rows[0].keys())\n                with open(csv_path, \"w\"\
          , newline=\"\") as f:\n                    writer = csv.DictWriter(f, fieldnames=fieldnames)\n\
          \                    writer.writeheader()\n                    writer.writerows(csv_rows)\n\
          \n                mlflow.log_artifact(csv_path, \"results\")\n         \
          \       print(f\"Uploaded CSV artifact: {csv_path}\", flush=True)\n\n  \
          \          # Upload raw benchmark output.json\n            mlflow.log_artifact(benchmark_results.path,\
          \ \"results\")\n            print(f\"Uploaded benchmark_output.json to results/\"\
          , flush=True)\n\n            # Upload LLMInferenceService YAML\n       \
          \     if os.path.exists(llmis_yaml.path):\n                mlflow.log_artifact(llmis_yaml.path,\
          \ \"deployment\")\n                print(f\"Uploaded llminferenceservice.yaml\
          \ to deployment/\", flush=True)\n\n            # Upload benchmark logs\n\
          \            if os.path.exists(benchmark_logs.path):\n                mlflow.log_artifact(benchmark_logs.path,\
          \ \"logs\")\n                print(f\"Uploaded guidellm_logs.txt to logs/\"\
          , flush=True)\n\n            run_id = run.info.run_id\n            print(\"\
          \", flush=True)\n            print(\"=\" * 60, flush=True)\n           \
          \ print(f\"MLflow upload complete!\", flush=True)\n            print(f\"\
          Run ID: {run_id}\", flush=True)\n            print(f\"Experiment: {experiment_name}\"\
          , flush=True)\n            print(\"=\" * 60, flush=True)\n\n           \
          \ return run_id\n\n    except Exception as e:\n        print(f\"ERROR: MLflow\
          \ upload failed: {e}\", flush=True)\n        import traceback\n        traceback.print_exc()\n\
          \        return \"failed\"\n\n"
        image: python:3.9-slim
    exec-wait-for-endpoint:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - wait_for_endpoint
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef wait_for_endpoint(\n    deployment_name: str,\n    target_endpoint:\
          \ str,\n    namespace: str,\n    timeout_seconds: int = 3600,\n) -> str:\n\
          \    \"\"\"Wait for inference endpoint to be healthy.\"\"\"\n    import\
          \ subprocess\n    import time\n    import os\n    import urllib.request\n\
          \    import tarfile\n\n    # Force unbuffered output for KFP log streaming\n\
          \    os.environ[\"PYTHONUNBUFFERED\"] = \"1\"\n\n    # Install oc CLI to\
          \ /tmp (writable location)\n    print(\"Installing OpenShift CLI...\", flush=True)\n\
          \    oc_url = \"https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz\"\
          \n    tar_path = \"/tmp/oc.tar.gz\"\n    bin_path = \"/tmp/bin\"\n    os.makedirs(bin_path,\
          \ exist_ok=True)\n    urllib.request.urlretrieve(oc_url, tar_path)\n   \
          \ with tarfile.open(tar_path, \"r:gz\") as tar:\n        tar.extractall(bin_path)\n\
          \    os.chmod(f\"{bin_path}/oc\", 0o755)\n    os.environ[\"PATH\"] = f\"\
          {bin_path}:{os.environ.get('PATH', '')}\"\n    print(\"OpenShift CLI installed.\"\
          , flush=True)\n\n    print(\"=\" * 60, flush=True)\n    print(\"Stage 2:\
          \ Wait for Endpoint\", flush=True)\n    print(\"=\" * 60, flush=True)\n\n\
          \    kubeconfig = \"/kubeconfig/config\"\n\n    print(f\"Deployment: {deployment_name}\"\
          , flush=True)\n    print(f\"Endpoint: {target_endpoint}\", flush=True)\n\
          \    print(f\"Timeout: {timeout_seconds}s\", flush=True)\n\n    def oc(args,\
          \ timeout=120):\n        cmd = [\"oc\", \"--kubeconfig\", kubeconfig] +\
          \ args\n        return subprocess.run(cmd, capture_output=True, text=True,\
          \ timeout=timeout)\n\n    # Wait for LLMInferenceService to be ready\n \
          \   print(\"Waiting for LLMInferenceService to be ready...\", flush=True)\n\
          \    start = time.time()\n    while time.time() - start < timeout_seconds:\n\
          \        result = oc([\"get\", \"llminferenceservice\", deployment_name,\
          \ \"-n\", namespace,\n                     \"-o\", \"jsonpath={.status.conditions[?(@.type=='Ready')].status}\"\
          ])\n        if result.stdout.strip() == \"True\":\n            print(\"\
          LLMInferenceService is Ready!\", flush=True)\n            break\n      \
          \  print(f\"Waiting... ({int(time.time() - start)}s)\", flush=True)\n  \
          \      time.sleep(15)\n\n    # Test endpoint via curl from a pod\n    print(\"\
          \", flush=True)\n    print(f\"Testing endpoint: {target_endpoint}/v1/models\"\
          , flush=True)\n\n    # Find the vLLM KServe pod (use KServe-specific label)\n\
          \    result = oc([\"get\", \"pods\", \"-n\", namespace,\n              \
          \   \"-l\", f\"app.kubernetes.io/name={deployment_name}\",\n           \
          \      \"-o\", \"jsonpath={.items[0].metadata.name}\"])\n    pod_name =\
          \ result.stdout.strip()\n\n    if pod_name:\n        elapsed = 0\n     \
          \   while elapsed < 300:\n            result = oc([\"exec\", \"-n\", namespace,\
          \ pod_name, \"-c\", \"main\", \"--\",\n                         \"curl\"\
          , \"-sk\", f\"{target_endpoint}/v1/models\"])\n            if \"data\" in\
          \ result.stdout:\n                print(\"Endpoint is healthy!\", flush=True)\n\
          \                print(result.stdout[:500], flush=True)\n              \
          \  return \"healthy\"\n            print(f\"Waiting for endpoint... ({elapsed}s)\"\
          , flush=True)\n            time.sleep(15)\n            elapsed += 15\n\n\
          \    print(\"WARNING: Health check timed out\", flush=True)\n    return\
          \ \"timeout\"\n\n"
        image: python:3.9-slim
pipelineInfo:
  description: RHOAI Benchmark with LLMInferenceService, secret mounting, and log
    streaming
  name: rhoai-benchmark-v2
root:
  dag:
    tasks:
      cleanup:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-cleanup
        dependentTasks:
        - deploy-rhoai-model
        - run-guidellm-benchmark
        inputs:
          parameters:
            deployment_name:
              taskOutputParameter:
                outputParameterKey: deployment_name
                producerTask: deploy-rhoai-model
            namespace:
              componentInputParameter: namespace
            skip_cleanup:
              componentInputParameter: skip_cleanup
            workload_name:
              componentInputParameter: run_uuid
        taskInfo:
          name: cleanup
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - deploy-rhoai-model
        - run-guidellm-benchmark
        inputs:
          artifacts:
            pipelinechannel--deploy-rhoai-model-llmis_yaml:
              taskOutputArtifact:
                outputArtifactKey: llmis_yaml
                producerTask: deploy-rhoai-model
            pipelinechannel--run-guidellm-benchmark-benchmark_logs:
              taskOutputArtifact:
                outputArtifactKey: benchmark_logs
                producerTask: run-guidellm-benchmark
            pipelinechannel--run-guidellm-benchmark-benchmark_results:
              taskOutputArtifact:
                outputArtifactKey: benchmark_results
                producerTask: run-guidellm-benchmark
          parameters:
            pipelinechannel--accelerator:
              componentInputParameter: accelerator
            pipelinechannel--guidellm_data:
              componentInputParameter: guidellm_data
            pipelinechannel--guidellm_rate:
              componentInputParameter: guidellm_rate
            pipelinechannel--mlflow_enabled:
              componentInputParameter: mlflow_enabled
            pipelinechannel--model_name:
              componentInputParameter: model_name
            pipelinechannel--run_uuid:
              componentInputParameter: run_uuid
            pipelinechannel--tp:
              componentInputParameter: tp
            pipelinechannel--version:
              componentInputParameter: version
        taskInfo:
          name: post-processing
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--mlflow_enabled'] ==
            'true'
      deploy-rhoai-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-deploy-rhoai-model
        inputs:
          parameters:
            kueue_queue_name:
              componentInputParameter: kueue_queue_name
            model_name:
              componentInputParameter: model_name
            namespace:
              componentInputParameter: namespace
            routing_mode:
              componentInputParameter: routing_mode
            run_uuid:
              componentInputParameter: run_uuid
            tp:
              componentInputParameter: tp
            vllm_args:
              componentInputParameter: vllm_args
        taskInfo:
          name: deploy-rhoai-model
      run-guidellm-benchmark:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-run-guidellm-benchmark
        dependentTasks:
        - deploy-rhoai-model
        - wait-for-endpoint
        inputs:
          parameters:
            accelerator:
              componentInputParameter: accelerator
            deployment_name:
              taskOutputParameter:
                outputParameterKey: deployment_name
                producerTask: deploy-rhoai-model
            guidellm_data:
              componentInputParameter: guidellm_data
            guidellm_image:
              componentInputParameter: guidellm_image
            guidellm_max_seconds:
              componentInputParameter: guidellm_max_seconds
            guidellm_rate:
              componentInputParameter: guidellm_rate
            model_name:
              componentInputParameter: model_name
            namespace:
              componentInputParameter: namespace
            target_endpoint:
              taskOutputParameter:
                outputParameterKey: target_endpoint
                producerTask: deploy-rhoai-model
            version:
              componentInputParameter: version
        taskInfo:
          name: run-guidellm-benchmark
      stream-vllm-logs:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-stream-vllm-logs
        dependentTasks:
        - deploy-rhoai-model
        inputs:
          parameters:
            deployment_name:
              taskOutputParameter:
                outputParameterKey: deployment_name
                producerTask: deploy-rhoai-model
            duration_seconds:
              runtimeValue:
                constant: 1800.0
            namespace:
              componentInputParameter: namespace
        taskInfo:
          name: stream-vllm-logs
      wait-for-endpoint:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-wait-for-endpoint
        dependentTasks:
        - deploy-rhoai-model
        inputs:
          parameters:
            deployment_name:
              taskOutputParameter:
                outputParameterKey: deployment_name
                producerTask: deploy-rhoai-model
            namespace:
              componentInputParameter: namespace
            target_endpoint:
              taskOutputParameter:
                outputParameterKey: target_endpoint
                producerTask: deploy-rhoai-model
        taskInfo:
          name: wait-for-endpoint
  inputDefinitions:
    parameters:
      accelerator:
        defaultValue: H200
        isOptional: true
        parameterType: STRING
      guidellm_data:
        defaultValue: prompt_tokens=1000,output_tokens=1000
        isOptional: true
        parameterType: STRING
      guidellm_image:
        defaultValue: image-registry.openshift-image-registry.svc:5000/llm-d-bench/guidellm-custom:v0.5.3
        isOptional: true
        parameterType: STRING
      guidellm_max_seconds:
        defaultValue: '120'
        isOptional: true
        parameterType: STRING
      guidellm_rate:
        defaultValue: 1,10
        isOptional: true
        parameterType: STRING
      kubeconfig_secret:
        defaultValue: h200-kubeconfig
        isOptional: true
        parameterType: STRING
      kueue_queue_name:
        defaultValue: benchmark-queue
        isOptional: true
        parameterType: STRING
      mlflow_enabled:
        defaultValue: 'false'
        isOptional: true
        parameterType: STRING
      model_name:
        defaultValue: Qwen/Qwen3-0.6B
        isOptional: true
        parameterType: STRING
      namespace:
        defaultValue: llm-d-bench
        isOptional: true
        parameterType: STRING
      routing_mode:
        defaultValue: direct
        isOptional: true
        parameterType: STRING
      run_uuid:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      skip_cleanup:
        defaultValue: false
        isOptional: true
        parameterType: BOOLEAN
      tp:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      version:
        defaultValue: RHOAI-3.2
        isOptional: true
        parameterType: STRING
      vllm_args:
        defaultValue: --max-model-len=8192,--gpu-memory-utilization=0.95
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-cleanup-rhoai-deployment:
          secretAsVolume:
          - mountPath: /kubeconfig
            optional: false
            secretName: h200-kubeconfig
            secretNameParameter:
              runtimeValue:
                constant: h200-kubeconfig
        exec-deploy-rhoai-model:
          secretAsVolume:
          - mountPath: /kubeconfig
            optional: false
            secretNameParameter:
              componentInputParameter: kubeconfig_secret
        exec-run-guidellm-benchmark:
          secretAsVolume:
          - mountPath: /kubeconfig
            optional: false
            secretNameParameter:
              componentInputParameter: kubeconfig_secret
        exec-stream-vllm-logs:
          secretAsVolume:
          - mountPath: /kubeconfig
            optional: false
            secretNameParameter:
              componentInputParameter: kubeconfig_secret
        exec-upload-to-mlflow:
          secretAsEnv:
          - keyToEnv:
            - envVar: AWS_ACCESS_KEY_ID
              secretKey: AWS_ACCESS_KEY_ID
            - envVar: AWS_SECRET_ACCESS_KEY
              secretKey: AWS_SECRET_ACCESS_KEY
            - envVar: AWS_DEFAULT_REGION
              secretKey: AWS_DEFAULT_REGION
            optional: false
            secretName: aws-credentials
            secretNameParameter:
              runtimeValue:
                constant: aws-credentials
        exec-wait-for-endpoint:
          secretAsVolume:
          - mountPath: /kubeconfig
            optional: false
            secretNameParameter:
              componentInputParameter: kubeconfig_secret
