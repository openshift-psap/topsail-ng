models:
  llama-70b-fp8:
    name: "Llama-3.3-70B-Instruct-FP8"
    hf_model_id: "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic"
    aliases: [llama-70b, llama-3.3-70b]
    default_tp: 4
    min_gpus: 4
    vllm_args:
      - "--max-model-len=32768"
      - "--gpu-memory-utilization=0.95"
      - "--quantization=fp8"
    supported_workflows: [standard, prefix_cache]

  deepseek-r1:
    name: "DeepSeek-R1-0528"
    hf_model_id: "deepseek-ai/DeepSeek-R1-0528"
    aliases: [deepseek, r1]
    default_tp: 8
    min_gpus: 8
    vllm_args:
      - "--max-model-len=16384"
      - "--gpu-memory-utilization=0.95"
    supported_workflows: [standard]

  qwen-235b:
    name: "Qwen3-235B-A22B-FP8"
    hf_model_id: "RedHatAI/Qwen3-235B-A22B-FP8-dynamic"
    aliases: [qwen-235b, qwen3]
    default_tp: 8
    min_gpus: 8
    vllm_args:
      - "--max-model-len=16384"
      - "--gpu-memory-utilization=0.95"
      - "--quantization=fp8"
    supported_workflows: [standard]

  mixtral-8x22b:
    name: "Mixtral-8x22B-Instruct"
    hf_model_id: "mistralai/Mixtral-8x22B-Instruct-v0.1"
    aliases: [mixtral, mixtral-8x22b]
    default_tp: 8
    min_gpus: 8
    vllm_args:
      - "--max-model-len=16384"
      - "--gpu-memory-utilization=0.95"
